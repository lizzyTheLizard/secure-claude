name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm vitest run --reporter=verbose tests/**/*.unit.test.ts

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}-${{ hashFiles('src/bin/docker-compose.yaml.template') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Load Docker cache
        run: |
          if [ -f /tmp/docker-cache/image.tar ]; then
            docker load -i /tmp/docker-cache/image.tar
          fi

      - name: Integration tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm vitest run --reporter=verbose tests/**/*.integration.test.ts

      - name: Save Docker cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          docker save $(docker images -q | head -1) -o /tmp/docker-cache/image.tar 2>/dev/null || true
