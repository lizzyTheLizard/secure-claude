name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  buildtest:
    runs-on: ubuntu-latest
    name: Build and test
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm vitest run --reporter=verbose .unit.test

  integrationtest:
    runs-on: ubuntu-latest
    name: Integration tests
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/docker-cache
          key: docker-${{ runner.os }}-${{ hashFiles('src/bin/docker-compose.yaml.template') }}
          restore-keys: docker-${{ runner.os }}-

      - name: Load Docker cache
        run: |
          if [ -f /tmp/docker-cache/image.tar ]; then
            docker load -i /tmp/docker-cache/image.tar
          fi

      - name: Integration tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm vitest run --no-file-parallelism --reporter=verbose --exclude "tests/claude.integration.test.ts" .integration.test

      - name: Save Docker cache
        if: always()
        run: |
          mkdir -p /tmp/docker-cache
          docker save $(docker images -q | head -1) -o /tmp/docker-cache/image.tar 2>/dev/null || true

  check-release:
    runs-on: ubuntu-latest
    name: Check release readiness
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect version change
        id: detect
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
              echo "Checking for changes in package.json against origin/main"
              git fetch origin main > /dev/null 2>&1
              git diff origin/main -- package.json | grep -q '"version"'
              VERSION_CHANGED=$?
          else
              echo "Checking for changes in package.json against HEAD~1"
              git diff HEAD~1 -- package.json | grep -q '"version"'
              VERSION_CHANGED=$?
          fi
          if [ $VERSION_CHANGED -eq 0 ]; then
              VERSION=$(node -p "require('./package.json').version")
              echo "Version changed in package.json, new version is $VERSION"
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
              echo "Version not changed in package.json"
              echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.detect.outputs.changed == 'true'

      - uses: actions/setup-node@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.detect.outputs.changed == 'true'
        run: pnpm install

      - name: Run check-release
        if: steps.detect.outputs.changed == 'true'
        run: pnpm check-release

  publish:
    runs-on: ubuntu-latest
    name: Tag and publish
    needs: [buildtest, integrationtest,check-release]
    if: |
      needs.check-release.outputs.changed == 'true' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-release.outputs.version }}"
          git push origin "v${{ needs.check-release.outputs.version }}"

      - name: Publish to npm
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
